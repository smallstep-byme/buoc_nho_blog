{% extends "base.html" %}
{% block content %}
{% if articles %}
<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-10 lg:gap-x-12 gap-y-16">
    {% for article in articles %}
    <article class="flex flex-col">
        <div class="w-full h-56 bg-[#dbe4ec] flex items-center justify-center text-gray-400 text-sm mb-5 font-semibold">
            Image Placeholder
        </div>
        <h2 class="text-[22px] font-bold mb-3 text-[#1f2d3d] leading-snug tracking-tight"><a
                href="{{ SITEURL }}/{{ article.url }}" class="hover:text-[#b31b1b] transition-colors">{{ article.title
                }}</a></h2>
        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-4">{{ article.locale_date }}</div>
        <p class="text-[14px] text-gray-500 mb-5 leading-relaxed flex-grow">
            {{ article.summary|striptags|truncate(150) }}
        </p>
        <a href="{{ SITEURL }}/{{ article.url }}"
            class="text-[11px] font-bold text-[#b31b1b] tracking-wider uppercase hover:underline">Read the article</a>
    </article>
    {% endfor %}
</div>
{% endif %}
{% endblock content %}
